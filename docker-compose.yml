version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: chatbot-postgres

    restart: always

    environment:
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot123
      POSTGRES_DB: chatbot_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
  qdrant:
    image: qdrant/qdrant:latest
    container_name: chatbot-qdrant

    restart: always

    ports:
      - "6333:6333"

    volumes:
      - qdrant_data:/qdrant/storage
  minio:
    image: minio/minio:latest
    container_name: chatbot-minio

    ports:
      - "9000:9000"
      - "9001:9001"

    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

    command: server /data --console-address ":9001"

    volumes:
      - minio_data:/data

  redis:
    image: redis:7-alpine
    container_name: chatbot-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: apps/central-hub-backend/Dockerfile
    container_name: chatbot-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://chatbot:chatbot123@postgres:5432/chatbot_db
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - GROQ_API_KEY=fake_test_key
    depends_on:
      - postgres
      - redis
      - minio
      - qdrant
    restart: always

  celery-worker:
    build:
      context: .
      dockerfile: apps/central-hub-backend/Dockerfile
    container_name: chatbot-celery-worker
    command: celery -A src.celery_app.celery_app worker --loglevel=info -P solo
    environment:
      - DATABASE_URL=postgresql://chatbot:chatbot123@postgres:5432/chatbot_db
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - GROQ_API_KEY=fake_test_key
    depends_on:
      - postgres
      - redis
      - minio
      - qdrant
    restart: always

volumes:
  postgres_data:
  qdrant_data:
  minio_data: